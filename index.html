<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Florr Fan Game</title>
  <style>
    /* Fill the tab with no margins/scrollbars; Pixi appends its own canvas. */
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- PixiJS — exposes the global `PIXI` the view subsystem uses. -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>

  <!-- Boot the engine. Module scripts are deferred, so PIXI is loaded by now. -->
  <script type="module">
    import { VisualEngine } from "./VisualEngine/VisualEngine.js";
    import { GameEngine } from "./GameEngine/GameEngine.js";
    import { Entity, Rarity, Disposition } from "./GameEngine/entities/Entity.js";
    import { MobType } from "./GameEngine/entities/MobVariety.js";
    import { DebugDraw } from "./GameEngine/dev/DebugDraw.js";

    const visual = VisualEngine.shared;
    const game = GameEngine.shared;
    const grid = game.memory.worldMap; // world state lives in the game engine
    const view = visual.view;
    const inputs = game.mechanics.inputs;

    // Create the renderer/canvas (fills the tab, auto-resizes).
    await view.createCanvas();

    // Preload all game textures. Missing files fall back to a white placeholder
    // rather than crashing startup.
    try {
      await view.loadTextures();
    } catch (err) {
      console.warn("texture preload failed; using placeholder:", err);
    }

    // A hostile spider (hostile by type now; uses bug.png) — it hunts the player.
    // `Entity.spawn` builds it + inserts it into the grid in one call; disposition
    // is inherited from the mob type (HOSTILE), so no override needed.
   
    for (let i = 0; i < 1000; i++) {
        Entity.spawn(MobType.SPIDER, Rarity.SUPER, { x: Math.sin(i) * 300, y: i}, grid);
    }
    
    // The player: an ALLIED entity driven by input. Registered under a local
    // controller id ("local"); networked, the server would register per connection.
    const player = new Entity({ x: 0, y: 0, kind: "player", disposition: Disposition.ALLIED });
    // Render the player as a yellow circle (a circleBody, not a sprite).
    visual.geometry.circleBody(player, {
      radius: player.collisionRadius,
      fill: 0xffff00,
      stroke: 0x000000,
      strokeWidth: 2,
    });
    grid.insert(player);
    inputs.register("local", player);

    // --- WASD capture (client side) -> a direction vector ---
    const held = { w: false, a: false, s: false, d: false };
    const keyMap = { KeyW: "w", KeyA: "a", KeyS: "s", KeyD: "d" };
    addEventListener("keydown", (e) => { if (keyMap[e.code]) held[keyMap[e.code]] = true; });
    addEventListener("keyup",   (e) => { if (keyMap[e.code]) held[keyMap[e.code]] = false; });
    addEventListener("blur", () => { held.w = held.a = held.s = held.d = false; });

    // Dev overlay: red collision circles, blue collision dots, orange ranges.
    // Press "O" to toggle it.
    const debug = new DebugDraw(view.world);
    addEventListener("keydown", (e) => { if (e.code === "KeyO") debug.toggle(); });

    // The render region (center + size) follows the player. It doubles as the
    // sim region passed to step() — the engine takes render regions, not a
    // "camera", so a server could pass one per player. `step` accepts a single
    // region or an array; we wrap it in an array to show the multi-region shape.
    const region = { x: 0, y: 0, width: view.gameWidth, height: view.gameHeight };

    // Loop: feed WASD -> player movement intent, step the sim, follow + render.
    view.app.ticker.add(() => {
      const dx = (held.d ? 1 : 0) - (held.a ? 1 : 0);
      const dy = (held.s ? 1 : 0) - (held.w ? 1 : 0); // down is +y on screen
      inputs.moveDir("local", dx, dy);

      region.x = player.x;
      region.y = player.y;
      game.step([region]);

      const visible = view.draw(grid, region); // same rect drives rendering
      debug.draw(visible); // overlay on top of the rendered entities
    });
  </script>
</body>
</html>
